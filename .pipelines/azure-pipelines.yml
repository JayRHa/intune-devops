# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

variables:
 - group: IntuneDev
 - group: IntuneProd
parameters:
  - name: debug
    displayName: Debug mode
    type: boolean
    default: false
  - name: confType
    displayName: Config Type
    type: string
    values:
    - config-profile
    - compliance-policy
    - script
    - remediation-script
    - filter
  - name: objectId
    displayName: Object Id
    type: string

pool:
  vmImage: windows-latest
  #vmImage: 'ubuntu-latest'

stages:
- stage: validate
  displayName: Show input
  jobs:
  - job: print_input
    displayName: Print Input
    steps:
    - task: PowerShell@2
      inputs:
        targetType: 'inline'
        # Use runtime expression $(...) and env vars instead of compile-time ${{ }}
        # substitution to prevent the user-supplied parameter from being interpolated
        # directly into the script body (which would allow PowerShell command injection).
        script: |
          Write-Host "-------------------------------"
          Write-Host "Intune object type to move: $env:CONF_TYPE"
          Write-Host "Intune object id to move:   $env:OBJECT_ID"
          Write-Host "Debug mode: $env:DEBUG_MODE"
      env:
        CONF_TYPE: ${{ parameters.confType }}
        OBJECT_ID: ${{ parameters.objectId }}
        DEBUG_MODE: ${{ parameters.debug }}

- stage: getSourceObject
  displayName: Get source object from dev
  jobs:
  - job: get_object_from_dev
    displayName: Get object from dev
    steps:
    - task: PowerShell@2
      inputs:
        filePath: '$(System.DefaultWorkingDirectory)/Get-IntuneObject.ps1'
        # Secrets are bound via env: so they are not exposed on the process command
        # line. Azure DevOps masks $(secret) only when used as a single token; passing
        # them through env: also avoids accidental shell-quoting / injection issues.
        arguments: '-tenantId $env:TENANT_ID -clientId $env:CLIENT_ID -clientSecret $env:CLIENT_SECRET -type $env:CONF_TYPE -objectId $env:OBJECT_ID'
      env:
        TENANT_ID: $(DevTenantId)
        CLIENT_ID: $(DevAppId)
        CLIENT_SECRET: $(DevAppSecret)
        CONF_TYPE: ${{ parameters.confType }}
        OBJECT_ID: ${{ parameters.objectId }}
    - task: CopyFiles@2
      displayName: "Intune object to: $(build.artifactstagingdirectory)'"
      inputs:
        Contents: intuneObject.json
        TargetFolder: $(build.artifactstagingdirectory)
        flattenFolders: true
    - publish: ' $(build.artifactstagingdirectory)'
      displayName: 'Publish intune config json'
      artifact: 'package'

- stage: publishToProd
  displayName: Publish object to prod
  jobs:
  # Download artifact
  - job: publish_to_prod
    displayName: Publish object to prod
    steps:
    - task: DownloadPipelineArtifact@2
      displayName: 'Download Pipeline Artifact'
      inputs:
        artifactName: 'package'

    - task: PowerShell@2
      inputs:
        filePath: '$(System.DefaultWorkingDirectory)/Deploy-IntuneObject.ps1'
        # Secrets bound through env: rather than the command line. See note above.
        arguments: '-tenantId $env:TENANT_ID -clientId $env:CLIENT_ID -clientSecret $env:CLIENT_SECRET -type $env:CONF_TYPE -path "$(Pipeline.Workspace)/intuneObject.json"'
      env:
        TENANT_ID: $(ProdTenantId)
        CLIENT_ID: $(ProdAppId)
        CLIENT_SECRET: $(ProdAppSecret)
        CONF_TYPE: ${{ parameters.confType }}
